<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin:0; overflow:hidden; background:#87CEEB; touch-action: none; cursor: crosshair; }
        canvas { display:block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0, lives = 3, gameActive = true, isPaused = false, spawnTimer = 0;
let balloons = [];

// Platform Integration
window.parent.postMessage({ type: 'GAME_READY' }, '*');
window.addEventListener("message", (e) => {
    if (e.data.type === 'AD_STARTED') isPaused = true;
    if (e.data.type === 'AD_FINISHED') { isPaused = false; restart(); }
});

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function spawnBalloon() {
    const colors = ['#ff4d4d', '#ffcc00', '#33cc33', '#3399ff', '#cc33ff'];
    balloons.push({
        x: Math.random() * (canvas.width - 50) + 25,
        y: canvas.height + 50,
        radius: 30 + Math.random() * 20,
        speed: 2 + Math.random() * 4 + (score / 10),
        color: colors[Math.floor(Math.random() * colors.length)]
    });
}

// Input: Handle Click and Touch
function handleInput(ex, ey) {
    if (!gameActive && !isPaused) {
        restart();
        return;
    }
    if (isPaused) return;

    for (let i = balloons.length - 1; i >= 0; i--) {
        let b = balloons[i];
        let dist = Math.sqrt((ex - b.x)**2 + (ey - b.y)**2);
        if (dist < b.radius) {
            balloons.splice(i, 1);
            score++;
            return; // Only pop one balloon per click
        }
    }
}

canvas.addEventListener("mousedown", e => handleInput(e.clientX, e.clientY));
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});

function update() {
    if (!gameActive || isPaused) return;

    spawnTimer++;
    if (spawnTimer > Math.max(20, 60 - score)) {
        spawnBalloon();
        spawnTimer = 0;
    }

    for (let i = balloons.length - 1; i >= 0; i--) {
        let b = balloons[i];
        b.y -= b.speed;

        // If balloon escapes top
        if (b.y + b.radius < 0) {
            balloons.splice(i, 1);
            lives--;
            if (lives <= 0) {
                gameActive = false;
                window.parent.postMessage({ type: 'SHOW_AD' }, '*');
            }
        }
    }
}

function draw() {
    ctx.fillStyle = "#87CEEB"; // Sky Blue
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    balloons.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
        // Balloon String
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + b.radius);
        ctx.lineTo(b.x, b.y + b.radius + 20);
        ctx.strokeStyle = "white";
        ctx.stroke();
    });

    ctx.fillStyle = "white";
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 20, 40);
    ctx.fillText("Lives: " + "❤️".repeat(lives), 20, 80);

    if (!gameActive) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 40px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px Arial";
        ctx.fillText("Tap to Restart after Ad", canvas.width / 2, canvas.height / 2 + 50);
    }

    update();
    requestAnimationFrame(draw);
}

function restart() {
    score = 0; lives = 3; balloons = []; gameActive = true;
}
draw();
</script>
</body>
</html>
