<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Quest</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #E8F5E9; /* Soft green to match the dashboard card */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            touch-action: none; 
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Top UI Bar */
        #ui {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            pointer-events: none;
        }

        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        /* Central Instruction */
        #instruction {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 10px;
        }
        
        #instruction span {
            background: #FFCA28;
            color: #333;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 6px 0px #FFB300;
            border: 4px solid white;
            display: inline-block;
        }

        /* Answer Buttons Container */
        #answers {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .ans-btn {
            background: #42A5F5;
            color: white;
            border: 4px solid white;
            border-radius: 25px;
            font-size: 40px;
            font-weight: 900;
            width: 100px;
            height: 100px;
            cursor: pointer;
            box-shadow: 0 8px 0px #1E88E5;
            transition: all 0.1s;
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ans-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #1E88E5;
        }

        /* Specific Button Colors */
        .ans-btn:nth-child(1) { background: #FF6B6B; box-shadow: 0 8px 0px #D9534F; }
        .ans-btn:nth-child(2) { background: #4ECDC4; box-shadow: 0 8px 0px #3BA79F; }
        .ans-btn:nth-child(3) { background: #9267FF; box-shadow: 0 8px 0px #7048D8; }

        @media (max-width: 600px) {
            .stat-box { font-size: 18px; padding: 5px 10px; }
            #instruction span { font-size: 20px; padding: 8px 20px; }
            .ans-btn { width: 80px; height: 80px; font-size: 30px; border-width: 3px; }
            #answers { gap: 15px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box" style="border-color: #FFCA28;">⭐ <span id="score">0</span></div>
        <div class="stat-box" style="border-color: #FF6B6B;"><span id="lives">❤️❤️❤️</span></div>
    </div>
    
    <div id="instruction">
        <span>How many stars? ✨</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="answers">
        <button class="ans-btn" onclick="checkAnswer(0)" id="btn0">1</button>
        <button class="ans-btn" onclick="checkAnswer(1)" id="btn1">2</button>
        <button class="ans-btn" onclick="checkAnswer(2)" id="btn2">3</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");

// Game Variables
let score = 0, lives = 3, gameActive = true, isPaused = false;
let stars = [];
let targetNumber = 0;
let options = [];
let wobbleTime = 0;

// --- POKI-STYLE SDK INTEGRATION ---
window.parent.postMessage({ type: 'GAME_READY' }, '*');
window.addEventListener("message", (e) => {
    if (e.data.type === 'AD_STARTED') isPaused = true;
    if (e.data.type === 'AD_FINISHED') { isPaused = false; restart(); }
});

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- GAME LOGIC ---
function generateLevel() {
    stars = [];
    // Random number between 1 and 9
    targetNumber = Math.floor(Math.random() * 9) + 1;
    
    // Spawn Stars in the middle of the screen
    for(let i=0; i < targetNumber; i++) {
        stars.push({
            // Keep stars away from the edges, top UI, and bottom buttons
            x: Math.random() * (canvas.width - 150) + 75,
            y: Math.random() * (canvas.height - 300) + 120,
            radius: 15 + Math.random() * 10,
            offset: Math.random() * Math.PI * 2 // For twinkle animation
        });
    }

    // Generate Multiple Choice Options
    options = [targetNumber];
    while(options.length < 3) {
        let wrongAnswer = Math.floor(Math.random() * 9) + 1;
        if(!options.includes(wrongAnswer)) {
            options.push(wrongAnswer);
        }
    }
    
    // Shuffle options
    options.sort(() => Math.random() - 0.5);

    // Update Buttons
    for(let i=0; i<3; i++) {
        document.getElementById(`btn${i}`).innerText = options[i];
    }
}

function checkAnswer(btnIndex) {
    if (!gameActive || isPaused) return;

    if (options[btnIndex] === targetNumber) {
        // Correct!
        score++;
        scoreEl.innerText = score;
        generateLevel();
    } else {
        // Wrong!
        lives--;
        livesEl.innerText = "❤️".repeat(lives);
        
        if (lives <= 0) {
            gameActive = false;
            window.parent.postMessage({ type: 'SHOW_AD' }, '*');
        }
    }
}

// --- DRAWING THE SCENE ---
function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
    let rot = Math.PI / 2 * 3;
    let x = cx;
    let y = cy;
    let step = Math.PI / spikes;

    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#F57F17';
    ctx.stroke();
    ctx.fillStyle = '#FFEB3B';
    ctx.fill();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameActive && !isPaused) {
        wobbleTime += 0.05;

        stars.forEach(s => {
            // Make them float up and down slightly
            let floatY = s.y + Math.sin(wobbleTime + s.offset) * 10;
            
            // Draw a soft glow
            ctx.beginPath();
            ctx.arc(s.x, floatY, s.radius * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 235, 59, ${0.1 + Math.sin(wobbleTime * 2 + s.offset) * 0.1})`;
            ctx.fill();

            // Draw the actual star
            drawStar(s.x, floatY, 5, s.radius * 1.5, s.radius * 0.7);
        });
    }

    if (!gameActive) {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#FF6B6B";
        ctx.textAlign = "center";
        ctx.font = "bold 50px 'Comic Sans MS'";
        ctx.fillText("Oops! Out of Hearts!", canvas.width / 2, canvas.height / 2);
        
        ctx.fillStyle = "#333";
        ctx.font = "24px 'Comic Sans MS'";
        ctx.fillText("Loading Ad & Restarting...", canvas.width / 2, canvas.height / 2 + 50);
    }

    requestAnimationFrame(draw);
}

function restart() {
    score = 0; 
    lives = 3; 
    gameActive = true;
    scoreEl.innerText = score;
    livesEl.innerText = "❤️❤️❤️";
    generateLevel();
}

// Start Game
generateLevel();
draw();
</script>
</body>
</html>
